name: Mono-Repo Smart Deploy

on:
  push:
    branches: [ main ]

jobs:
  # 1. 어떤 서비스가 변경되었는지 감지
  check-changes:
    runs-on: self-hosted
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            admin: 'admin/**'
            auth: 'auth/**'
            batch: 'batch/**'
            common: 'common/**'
            core: 'core/**'
            file: 'file/**'
            message: 'message/**'
            notificator: 'notificator/**'
            org: 'organization/**'
            user: 'user/**'

  # 2. 변경된 서비스만 배포 진행
  deploy:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.services != '[]' && needs.check-changes.outputs.services != '' }}
    runs-on: self-hosted
    strategy:
      fail-fast: false  # 하나가 실패해도 나머지는 계속 진행
      matrix:
        service: ${{ fromJson(needs.check-changes.outputs.services) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # [중요] GitHub Secrets에 저장된 ENV_서비스명 데이터를 .env 파일로 생성
      - name: Create Dynamic .env File
        run: |
         SERVICE_UPPER=$(echo "${{ matrix.service }}" | tr '[:lower:]' '[:upper:]')
          VAR_NAME="ENV_$SERVICE_UPPER"
          eval "CONTENT=\$$VAR_NAME"
          
          # .env 파일을 서비스 폴더 안에 생성
          echo "$CONTENT" > ./${{ matrix.service }}/.env
          
          # [디버깅용] 파일이 잘 구워졌는지 크기만 확인 (내용 유출 방지)
          echo "--- Check .env file size ---"
          ls -lh ./${{ matrix.service }}/.env
        env:
          # 모든 서비스의 Secrets를 환경변수로 미리 매핑해둡니다.
          ENV_ADMIN: ${{ secrets.ENV_ADMIN }}
          ENV_AUTH: ${{ secrets.ENV_AUTH }}
          ENV_BATCH: ${{ secrets.ENV_BATCH }}
          ENV_COMMON: ${{ secrets.ENV_COMMON }}
          ENV_CORE: ${{ secrets.ENV_CORE }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
          ENV_MESSAGE: ${{ secrets.ENV_MESSAGE }}
          ENV_NOTIFICATOR: ${{ secrets.ENV_NOTIFICATOR }}
          ENV_ORG: ${{ secrets.ENV_ORG }}
          ENV_USER: ${{ secrets.ENV_USER }}

      # 서비스 빌드 및 배포
      - name: Build and Deploy ${{ matrix.service }}
        run: |
          SERVICE_NAME=${{ matrix.service }}
          
          # 1. 이미지 빌드
          docker build -t messenger-$SERVICE_NAME:latest ./$SERVICE_NAME
          
          # 2. 기존 컨테이너 정리 (확실한 갱신을 위해)
          docker rm -f ${SERVICE_NAME}-service || true
          
          # 3. docker run으로 직접 실행 (Compose 파일 체크를 우회하는 가장 확실한 방법)
          # 호스트 네트워크 모드이므로 설정이 복잡하지 않습니다.
          docker run -d \
            --name ${SERVICE_NAME}-service \
            --net="host" \
            --restart no \
            --env-file ./${SERVICE_NAME}/.env \
            $(if [ "$SERVICE_NAME" == "file" ]; then echo "-v $(pwd)/file/private.key:/run/secrets/jwt_private_key:ro"; fi) \
            $(if [ "$SERVICE_NAME" == "org" ]; then echo "-v /path/on/host/storage/org_files:/app/storage/org_files"; fi) \
            messenger-$SERVICE_NAME:latest

          echo "🚀 $SERVICE_NAME 배포 및 환경 변수 주입 완료!"