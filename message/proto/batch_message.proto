syntax = "proto3";

// 이 패키지 이름은 Go 코드에서 import 경로가 됩니다.
option go_package = "message/internal/infrastructure/pb";

// package file;은 **"이 대화(API)의 주제가 무엇인가"**를 정의하는 것이지, 현재 내가 작업 중인 서비스 이름을 적는 게 아닙니다.
package batchMessage;

// 파일 서비스가 외부(Message 서비스 등)에 제공할 기능들
service BatchMessageService {
  // 파일 전송 상태를 업데이트하는 함수 (쪽지 전송 시 호출)
  rpc GetSendFileInfo (GetSendFileInfoRequest) returns (GetSendFileInfoResponse);
}

// 배열은 repeated
// 스네이크 케이스로 작성해도 Go로 컴파일하면 자동으로 카멜 케이스로 전환 

// 요청할 때 보낼 데이터
message GetSendFileInfoRequest {
  repeated string file_ids = 1;
}

// 응답으로 받을 데이터
message GetSendFileInfoResponse {
  bool success = 1;
  repeated FileInfo file_info = 2;
}

// 응답 구조체
message FileInfo {
    string file_id = 1;
    string line_key = 2;
}