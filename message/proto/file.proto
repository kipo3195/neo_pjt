syntax = "proto3";

// 이 패키지 이름은 Go 코드에서 import 경로가 됩니다.
option go_package = "message/internal/infrastructure/pb";

// package file;은 **"이 대화(API)의 주제가 무엇인가"**를 정의하는 것이지, 현재 내가 작업 중인 서비스 이름을 적는 게 아닙니다.
package file;

// 파일 서비스가 외부(Message 서비스 등)에 제공할 기능들
service FileService {
  // 파일 전송 상태를 업데이트하는 함수 (쪽지 전송 시 호출)
  rpc UpdateFileStatus (UpdateFileRequest) returns (UpdateFileResponse);
}

// 요청할 때 보낼 데이터
message UpdateFileRequest {
  string transactionId = 1;
}

// 응답으로 받을 데이터
message UpdateFileResponse {
  bool success = 1;
  string message = 2;
}