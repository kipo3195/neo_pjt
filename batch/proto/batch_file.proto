syntax = "proto3";

// 이 패키지 이름은 Go 코드에서 import 경로가 됩니다.
option go_package = "batch/internal/infrastructure/pb";

// package는 **"이 대화(API)의 주제가 무엇인가"**를 정의하는 것이지, 현재 내가 작업 중인 서비스 이름을 적는 게 아닙니다.
package batchFile;

// 파일 서비스가 외부(Message 서비스 등)에 제공할 기능들 -> 구현시 아마 Client가 붙는듯 
service BatchFileService {
  // 파일 전송 상태를 업데이트하는 함수 (쪽지 전송 시 호출)
  rpc UploadFileCheck (UploadFileCheckRequest) returns (UploadFileCheckResponse);
  rpc ClearFileStorage (ClearFileStorageRequest) returns (ClearFileStorageResponse);
  rpc GetInvalidFileInfo (GetInvalidFileInfoRequest) returns (GetInvalidFileInfoResponse);
}

// UploadFileCheck 요청할 때 보낼 데이터
message UploadFileCheckRequest {
  string checkDate = 1;
}

// UploadFileCheck 응답으로 받을 데이터
message UploadFileCheckResponse {
  bool success = 1;
  string message = 2;
}

// 배열은 repeated
// 스네이크 케이스로 작성해도 Go로 컴파일하면 자동으로 카멜 케이스로 전환 

// ClearFileStorage 요청할 때 보낼 데이터
message ClearFileStorageRequest {
  repeated string clear_file_ids = 1;
  repeated string sended_file_ids = 2;
}

// ClearFileStorage 응답으로 받을 데이터
message ClearFileStorageResponse {
  bool success = 1;
  string message = 2;
}

// GetInvalidFileInfo 요청할 때 보낼 데이터
message GetInvalidFileInfoRequest{
  string yesterday = 1;
}

// GetInvalidFileInfo 응답으로 받을 데이터
message GetInvalidFileInfoResponse {
  repeated string invalid_file_id = 1;
  string message = 2;
}
